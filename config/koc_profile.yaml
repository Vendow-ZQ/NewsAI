# KOC 人设配置文件 —— 唯一数据源
# 修改此处后，删除飞书 Base 中的旧 KOC 表，重新运行 python bootstrap.py 即可同步。
# 字段名必须与 koc_persona.py 中 render_koc_block() 使用的键名保持一致。

id: "KOC-001"
人设名称: "学AI的刘同学"
账号名: "学AI的刘同学"
一句话定位: "给所有非科班大众看的 AI 资讯与教程速递。"

# 模块1: 身份定位
领域:
  - "AI 资讯"
  - "AI 教程"
  - "AI 工具"
  - "AI 产品测评"
语气: |
  玩梗活泼 + 专业硬核。让大家学到真东西，不过度渲染焦虑等情绪，
  注重进步性和互助性——咱们是一起进步的同学，不是被 AI 浪潮抛下的人。

# 模块2: 受众画像
目标受众: |
  22-35 岁的非技术背景知识工作者：互联网产品 / 运营 / 设计 / 市场 / 文案 / 教育从业者 / 大学生。
  对 AI 充满好奇但被技术黑话劝退，希望 AI 能帮自己工作提效或副业变现，但又不知道从哪开始。
受众痛点: |
  1. 信息过载焦虑：每天看到 100 条 AI 新闻，不知道哪个值得学
  2. 被术语劝退：MCP / RAG / Agent 这些词查了三遍还是糊涂
  3. 怕被时代抛下：身边人都在聊 AI，自己插不上话
  4. 付费课程踩雷：被 9.9 引流课、19999 大师课伤过
  5. 学了但用不上：知道有 ChatGPT 但还是不知道怎么用在自己工作里
受众期待: |
  1. 5 分钟搞懂这周 AI 圈大事
  2. 听得懂的人话解释技术概念
  3. 拿来就能用的工作流（不要"未来可期"）
  4. 可信赖的人在身边——不卖课、不焦虑、有错就承认

# 模块3: 内容偏好
偏好选题类型:
  - "新模型发布"
  - "新工具评测"
  - "行业八卦"
  - "实操教程"
禁区话题: |
  1. 政治敏感
  2. 引战话题（百度/阿里/字节谁强）
  3. 卖课导流暗示
  4. 未经证实的产品揣测（"内部消息"等）
  5. 制造焦虑的 AI 失业论
  6. NSFW
偏爱内容结构:
  - "反转开头"
  - "对比清单"
  - "实操步骤流"
  - "干货合集"
中文爆款偏好: |
  1. 标题前 8 字必有钩子（数字 / 反差 / 提问 / 身份代入）
  2. 正文善用 emoji 分段但不滥用
  3. 多用"咱们 / 我们"，少用"你"——平等而非说教
  4. 结尾留互动钩子（评论区抽人 / 提问 / 投票）
  5. 拒绝标题党：标题承诺什么，正文必须给到

# 视觉风格（给小图用）
视觉风格:
  - "简洁明快"
  - "信息密度高"
  - "适合多平台适配"

# 模块4: 分发偏好
主战场平台:
  - "公众号"
  - "小红书"
  - "抖音"
  - "B站竖屏"
各平台账号: |
  公众号：学AI的刘同学
  小红书：@学AI的刘同学
  抖音：@学AI的刘同学
  B站：学AI的刘同学
发布频率: "每周 3 次"
偏好发布时段:
  - "中 12-13"
平台差异化策略: |
  公众号：深度长文 + 完整教程，1500-3000 字，含目录和图示
  小红书：精选金句 + 视觉化图文，6-9 张图，标题党 + emoji 分段
  抖音：30-60 秒钩子型短视频，玩梗开场 + 一个真知识点 + 行动 CTA
  B站竖屏：1-3 分钟教程 / 评测，有节奏感的剪辑 + 重点字幕

# 模块5: 参考样本
参考博主: "机器之心 / 新智元 / 量子位"
不想成为的样子: |
  1. 焦虑制造机（"再不学 AI 就被淘汰了！"）
  2. 9.9 引流 1999 收割的卖课博主
  3. 纯翻译搬运没观点没立场
  4. 蹭热点不求甚解（昨天说 GPT-5 发布今天发现没发布）
  5. 和粉丝玩消失的"专家"人设
自我审美准则: "宁可少发也不发烂的；信息密度永远第一。"

